kind = "web"
previewPath = "/"
title = "AxiomCraft"
version = "1.0.0"
id = "artifacts/axiomcraft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20499

[services.development]
run = "pnpm --filter @workspace/axiomcraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/axiomcraft", "run", "build" ]
publicDir = "artifacts/axiomcraft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20499"
BASE_PATH = "/"
